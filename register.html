<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | TurfBook</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<section class="login-page">

<div class="login-container">

<div class="login-left">

<h1>Join TurfBook ⚽</h1>

<p>

Create your account and start booking premium sports grounds in seconds.

</p>

<ul>

<li><i class="fa-solid fa-circle-check"></i> Fast Registration</li>

<li><i class="fa-solid fa-circle-check"></i> Secure Account</li>

<li><i class="fa-solid fa-circle-check"></i> Easy Booking</li>

</ul>

</div>

<div class="login-right">

<h2>Create Account</h2>

<form>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
placeholder="Full Name">

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address">

</div>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
placeholder="Phone Number">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Confirm Password">

</div>

<button class="login-submit">

Create Account

</button>

<p class="register-text">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

</section>

<script src="js/main.js"></script>

</body>

</html>
