<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | TurfBook</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<section class="login-page">

<div class="login-container">

<div class="login-left">

<h1>Welcome Back 👋</h1>

<p>

Login to continue booking your favourite sports turfs.

</p>

<ul>

<li><i class="fa-solid fa-circle-check"></i> Instant Booking</li>

<li><i class="fa-solid fa-circle-check"></i> Secure Payments</li>

<li><i class="fa-solid fa-circle-check"></i> Premium Grounds</li>

</ul>

</div>

<div class="login-right">

<h2>Login</h2>

<form>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password">

</div>

<div class="remember">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button class="login-submit">

Login

</button>

<p class="register-text">

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</form>

</div>

</div>

</section>

<script src="js/main.js"></script>

</body>

</html>
